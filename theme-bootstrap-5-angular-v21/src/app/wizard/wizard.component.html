<div class="spinner-grow-backdrop loader-fadeout">
  <div class="spinner-grow"></div>
</div>

<div class="row align-items-center py-3">
  <div class="col">
    <h4 class="m-0">Wizard</h4>
  </div>
</div>

<form [formGroup]="formulario">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <ul
        ngbNav
        #wizard="ngbNav"
        class="nav-tabs nav-wizard"
        [activeId]="etapaAtiva()"
        (activeIdChange)="etapaAtiva.set($event)"
      >
        <li [ngbNavItem]="1">
          <a ngbNavLink type="button" class="checked">Etapa 1</a>
          <ng-template ngbNavContent>
            <div class="row g-3">
              <div class="col-12">
                <label for="wizardNome" class="form-label required">Nome</label>
                <input
                  id="wizardNome"
                  type="text"
                  class="form-control"
                  placeholder="Informe o nome"
                  formControlName="nome"
                />
              </div>

              <div class="col-12 col-lg-6">
                <label for="wizardPas" class="form-label required">Pressão sanguínea</label>
                <div class="input-group">
                  <input
                    id="wizardPas"
                    class="form-control"
                    type="text"
                    placeholder="PAS"
                    formControlName="pas"
                  />
                  <input
                    class="form-control"
                    type="text"
                    placeholder="PAD"
                    formControlName="pad"
                    aria-label="Pressão arterial diastólica"
                  />
                </div>
              </div>

              <div class="col-12 col-lg-6">
                <label for="wizardAtividade" class="form-label required">Atividade</label>
                <div class="input-group">
                  <input
                    id="wizardAtividade"
                    class="form-control"
                    type="text"
                    value="Inativo"
                    [disabled]="true"
                  />
                </div>
              </div>

              <div class="col-12 col-lg-4">
                <label for="wizardCpf" class="form-label required">CPF</label>
                <input
                  id="wizardCpf"
                  type="text"
                  class="form-control"
                  formControlName="cpf"
                />
              </div>

              <div class="col-12 col-lg-8">
                <label for="wizardEndereco" class="form-label">Endereço</label>
                <input
                  id="wizardEndereco"
                  type="text"
                  class="form-control"
                  formControlName="endereco"
                />
              </div>
            </div>
          </ng-template>
        </li>

        <li [ngbNavItem]="2">
          <a ngbNavLink type="button" class="checked">Etapa 2</a>
          <ng-template ngbNavContent>
            <p class="mb-0">Conteúdo da etapa 2</p>
          </ng-template>
        </li>

        <li [ngbNavItem]="3">
          <a ngbNavLink type="button">Etapa 3</a>
          <ng-template ngbNavContent>
            <p class="mb-0">Conteúdo da etapa 3</p>
          </ng-template>
        </li>

        <li [ngbNavItem]="4" [disabled]="true">
          <a ngbNavLink type="button">Etapa 4</a>
          <ng-template ngbNavContent>
            <p class="mb-0">Conteúdo da etapa 4</p>
          </ng-template>
        </li>
      </ul>

      <div [ngbNavOutlet]="wizard" class="mt-3"></div>
    </div>
  </div>

  <div class="container-fluid bg__gray--l40 border-top position-sticky mt-5 py-3" style="bottom: 0; z-index: 1020;">
    <div class="row align-items-center">
      <div class="col">
        <button
          type="button"
          class="btn btn-secondary me-1"
          title="Anterior"
          [disabled]="primeiraEtapa()"
          (click)="voltar()"
        >
          <i class="mdi mdi-arrow-left" aria-hidden="true"></i>
          <span class="d-none d-lg-inline-block ms-2">Anterior</span>
        </button>
        <button type="button" class="btn btn-secondary" title="Próximo" (click)="avancar()">
          <span class="d-none d-lg-inline-block me-2">Próximo</span>
          <i class="mdi mdi-arrow-right" aria-hidden="true"></i>
        </button>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-primary" [disabled]="!ultimaEtapaDisponivel()">
          Salvar
        </button>
        <button type="button" class="btn btn-secondary ms-1">Cancelar</button>
      </div>
    </div>
  </div>
</form>
