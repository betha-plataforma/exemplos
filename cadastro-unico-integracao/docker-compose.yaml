version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: pessoasdb
    environment:
      POSTGRES_DB: pessoas
      POSTGRES_USER: pessoas
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d pessoas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
