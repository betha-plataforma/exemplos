<div class="spinner-grow-backdrop loader-fadeout">
  <div class="spinner-grow"></div>
</div>

<div class="row align-items-center py-3">
  <div class="col">
    <h4 class="m-0">Dashboard</h4>
  </div>
</div>

<div class="row">
  @for (card of cardsResumo; track $index) {
    <div class="col-12 col-lg-3">
      <div class="card card-body text-center mb-2">
        <p [class]="card.textoClass">{{ card.valor }}</p>
        <p class="m-0">{{ card.titulo }}</p>
      </div>
    </div>
  }
</div>

<div class="row">
  @for (card of cardsIconeLateral; track $index) {
    <div class="col-12 col-lg-3">
      <div class="card card-body mb-2">
        <div class="row m-0 align-items-center">
          <div class="col-auto">
            <i [class]="card.iconeClass" aria-hidden="true"></i>
          </div>
          <div class="col">
            <p [class]="card.textoClass">{{ card.valor }}</p>
            <p class="m-0">{{ card.titulo }}</p>
          </div>
        </div>
      </div>
    </div>
  }
</div>

<div class="row">
  @for (card of cardsIconeTopo; track $index) {
    <div class="col-12 col-lg-3">
      <div class="card card-body text-center">
        <div class="row m-0 align-items-center">
          <div class="col-12">
            <i [class]="card.iconeClass" aria-hidden="true"></i>
          </div>
          <div class="col-12">
            <p [class]="card.textoClass">{{ card.valor }}</p>
            <p class="m-0">{{ card.titulo }}</p>
          </div>
        </div>
      </div>
    </div>
  }
</div>
